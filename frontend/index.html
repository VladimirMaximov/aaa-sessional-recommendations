<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SessionRec</title>
    <style>
      :root {
        --bg:         #F2F3F5;
        --surface:    #FFFFFF;
        --border:     #D9DBE3;
        --ink:        #1D2026;
        --ink-2:      #505760;
        --muted:      #8B919E;
        --green:      #00A046;
        --green-bg:   #E5F5ED;
        --green-dark: #009440;
        --red:        #E31E24;
        --red-bg:     #FDEAEA;
        --shadow:     0 2px 8px rgba(0,0,0,.08);
        --shadow-lg:  0 4px 20px rgba(0,0,0,.10);
        --r:          10px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }

      /* ── START ───────────────────────────────────────── */
      #start-screen {
        width: 100%;
        max-width: 400px;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        gap: 28px;
      }

      .start-logo {
        width: 72px; height: 72px;
        border-radius: 20px;
        background: var(--green);
        display: flex; align-items: center; justify-content: center;
      }
      .start-logo svg { width: 40px; height: 40px; }

      .start-title {
        text-align: center;
      }
      .start-title h1 {
        font-size: 26px; font-weight: 700; letter-spacing: -.4px;
        margin-bottom: 8px;
      }
      .start-title p {
        font-size: 14px; color: var(--muted); line-height: 1.65;
      }

      .start-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; }

      .btn-primary {
        width: 100%; padding: 15px;
        border-radius: var(--r); border: none;
        background: var(--green);
        color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
        cursor: pointer;
        transition: background .15s, transform .1s;
      }
      .btn-primary:hover  { background: var(--green-dark); }
      .btn-primary:active { transform: scale(.98); }

      .btn-secondary {
        width: 100%; padding: 14px;
        border-radius: var(--r);
        background: transparent;
        border: 1.5px solid var(--border);
        color: var(--ink-2); font-family: inherit; font-size: 14px; font-weight: 500;
        cursor: pointer;
        transition: border-color .15s, background .15s, color .15s;
      }
      .btn-secondary:hover {
        border-color: var(--green);
        background: var(--green-bg);
        color: var(--green);
      }

      /* ── FEED SCREEN ─────────────────────────────────── */
      #feed-screen {
        display: none;
        flex-direction: column;
        width: 100%;
        max-width: 420px;
        min-height: 100dvh;
      }

      /* ── TOPBAR ──────────────────────────────────────── */
      .topbar {
        position: sticky; top: 0; z-index: 20;
        height: 52px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        display: flex; align-items: center; justify-content: space-between;
        gap: 8px;
      }

      .brand {
        display: flex; align-items: center; gap: 8px;
        font-size: 16px; font-weight: 700; color: var(--ink);
        user-select: none;
      }
      .brand-icon {
        width: 28px; height: 28px;
        border-radius: 7px;
        background: var(--green);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .brand-icon svg { width: 16px; height: 16px; }

      .topbar-btns { display: flex; gap: 6px; }

      .pill {
        display: flex; align-items: center; gap: 5px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        color: var(--ink-2);
        font-family: inherit; font-size: 12px; font-weight: 500;
        cursor: pointer; white-space: nowrap;
        transition: border-color .15s, background .15s, color .15s;
      }
      .pill:hover { border-color: var(--green); color: var(--green); }
      .pill.active {
        background: var(--green-bg);
        border-color: var(--green);
        color: var(--green);
      }

      /* ── CARD ────────────────────────────────────────── */
      #feed-panel { padding: 14px 16px; }

      .card {
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
        animation: rise .3s cubic-bezier(.22,1,.36,1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: none; }
      }

      .img-wrap {
        position: relative;
        aspect-ratio: 4 / 3;
        background: #e2e4e9;
        overflow: hidden;
      }
      .img-wrap img {
        width: 100%; height: 100%;
        object-fit: cover; display: block;
      }

      /* rank badge — top right of image */
      #rank-badge {
        position: absolute; top: 10px; right: 10px; z-index: 1;
      }
      .badge {
        display: inline-flex; align-items: center; gap: 3px;
        padding: 4px 9px; border-radius: 999px;
        font-size: 12px; font-weight: 700; line-height: 1;
      }
      .badge.up   { background: var(--green); color: #fff; }
      .badge.down { background: var(--red);   color: #fff; }
      .badge.same { background: rgba(0,0,0,.45); color: #fff; }
      .badge.ann  { background: #7c3aed; color: #fff; }

      .card-body { padding: 12px 14px 4px; }
      .card-title {
        font-size: 16px; font-weight: 600; color: var(--ink);
        line-height: 1.35;
      }
      .card-meta {
        margin-top: 4px;
        font-size: 13px; color: var(--muted);
        min-height: 18px;
      }

      .card-actions {
        padding: 10px 14px 14px;
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      }
      .card-actions button {
        padding: 13px 8px;
        border-radius: 8px;
        font-family: inherit; font-size: 14px; font-weight: 600;
        cursor: pointer; border: none;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        transition: background .15s, transform .1s;
      }
      .card-actions button:active { transform: scale(.96); }

      .btn-skip {
        background: var(--bg);
        color: var(--ink-2);
        border: 1.5px solid var(--border) !important;
      }
      .btn-skip:hover { background: var(--red-bg); color: var(--red); border-color: var(--red) !important; }

      .btn-like {
        background: var(--green);
        color: #fff;
      }
      .btn-like:hover { background: var(--green-dark); }

      /* ── OVERVIEW DRAWER ─────────────────────────────── */
      #overview-drawer {
        display: none;
        flex-direction: column;
        margin: 0 16px 16px;
        background: var(--surface);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
        animation: rise .25s cubic-bezier(.22,1,.36,1) both;
      }

      .drawer-hdr {
        padding: 12px 16px;
        font-size: 13px; font-weight: 600; color: var(--ink-2);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
      }
      .drawer-hdr-legend {
        display: flex; align-items: center; gap: 10px;
        font-size: 11px; font-weight: 400; color: var(--muted);
      }
      .legend-dot {
        display: inline-flex; align-items: center; gap: 4px;
      }
      .dot {
        width: 7px; height: 7px; border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.green { background: var(--green); }
      .dot.red   { background: var(--red); }
      .dot.gray  { background: var(--muted); }

      .overview-list {
        max-height: calc(100dvh - 140px);
        overflow-y: auto;
        overscroll-behavior: contain;
      }
      .overview-list::-webkit-scrollbar { width: 4px; }
      .overview-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .ov-item {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
      }
      .ov-item:last-child { border-bottom: none; }
      .ov-item.liked   { background: #F0FAF5; }
      .ov-item.skipped { background: #FEF5F5; }

      .ov-rank {
        font-size: 11px; font-weight: 600; color: var(--muted);
        width: 22px; text-align: right; flex-shrink: 0;
      }

      .ov-thumb {
        width: 40px; height: 40px; border-radius: 8px;
        object-fit: cover; flex-shrink: 0;
        background: var(--bg);
        border: 1px solid var(--border);
      }

      .ov-text {
        flex: 1; min-width: 0;
        font-size: 13px; line-height: 1.3;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: var(--ink);
      }
      .ov-item.skipped .ov-text { color: var(--muted); text-decoration: line-through; }

      .ov-status {
        flex-shrink: 0;
        display: flex; align-items: center;
      }

      /* ── STATUS LINE ─────────────────────────────────── */
      .status-bar {
        padding: 6px 16px 12px;
        font-size: 13px; color: var(--muted);
        text-align: center;
        min-height: 32px;
      }

      /* ── SESSION SUMMARY ─────────────────────────────── */
      #summary-panel {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .summary-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 14px 16px 0;
      }

      .stat-card {
        background: var(--surface);
        border-radius: 10px;
        padding: 10px 8px;
        text-align: center;
        box-shadow: var(--shadow);
      }
      .stat-card .stat-val {
        font-size: 22px; font-weight: 700; line-height: 1;
      }
      .stat-card .stat-label {
        margin-top: 3px;
        font-size: 11px; color: var(--muted);
      }
      .stat-card.liked  .stat-val { color: var(--green); }
      .stat-card.skipped .stat-val { color: var(--red); }
      .stat-card.total  .stat-val { color: var(--ink); }

      .summary-list-wrap {
        flex: 1;
        overflow-y: auto;
        overscroll-behavior: contain;
      }
      .summary-list-wrap::-webkit-scrollbar { width: 4px; }
      .summary-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .summary-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
      }
      .summary-tab {
        padding: 10px 16px;
        font-size: 13px; font-weight: 600; color: var(--muted);
        border: none; background: transparent;
        font-family: inherit; cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: color .15s, border-color .15s;
      }
      .summary-tab.active {
        color: var(--green);
        border-bottom-color: var(--green);
      }

      .summary-legend {
        margin-left: auto;
        display: flex; align-items: center; gap: 10px;
        padding: 0 16px;
        font-size: 11px; font-weight: 400; color: var(--muted);
      }

      .summary-footer {
        padding: 12px 16px 24px;
        display: flex; flex-direction: column; gap: 8px;
      }
    </style>
  </head>
  <body>

    <!-- ── START SCREEN ───────────────────────────── -->
    <div id="start-screen">
      <div class="start-logo">
        <!-- simple chart-like icon, Avito-neutral -->
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="22" width="6" height="12" rx="2" fill="white" opacity=".7"/>
          <rect x="17" y="14" width="6" height="20" rx="2" fill="white" opacity=".85"/>
          <rect x="28" y="6"  width="6" height="28" rx="2" fill="white"/>
        </svg>
      </div>

      <div class="start-title">
        <h1>SessionRec</h1>
        <p>Лайкай и скипай — система переранжирует<br>выдачу в реальном времени</p>
      </div>

      <div class="start-actions">
        <button class="btn-primary"   id="btn-start">Начать новую сессию</button>
        <button class="btn-secondary" id="btn-continue" style="display:none">Продолжить предыдущую</button>
      </div>
    </div>

    <!-- ── FEED SCREEN ────────────────────────────── -->
    <div id="feed-screen">

      <div class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2"  y="9"  width="3" height="5" rx="1" fill="white" opacity=".7"/>
              <rect x="6.5" y="6" width="3" height="8" rx="1" fill="white" opacity=".85"/>
              <rect x="11" y="2" width="3" height="12" rx="1" fill="white"/>
            </svg>
          </div>
          SessionRec
        </div>
        <div class="topbar-btns">
          <button class="pill" id="btn-overview">
            <svg width="13" height="11" viewBox="0 0 13 11" fill="none"><rect y="0" width="13" height="1.5" rx=".75" fill="currentColor"/><rect y="4.25" width="13" height="1.5" rx=".75" fill="currentColor"/><rect y="8.5" width="13" height="1.5" rx=".75" fill="currentColor"/></svg>
            Выдача
          </button>
          <button class="pill" id="btn-end">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M9.5 3.2A5 5 0 1 1 3.5 3.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Завершить
          </button>
          <button class="pill" id="btn-new">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 0l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Новая
          </button>
        </div>
      </div>

      <!-- feed card -->
      <div id="feed-panel">
        <div class="card" id="card">
          <div class="img-wrap">
            <img id="card-img" alt="" />
            <div id="rank-badge"></div>
          </div>
          <div class="card-body">
            <div class="card-title" id="card-title">Загрузка…</div>
            <div class="card-meta"  id="card-meta"></div>
          </div>
          <div class="card-actions">
            <button class="btn-skip" id="btn-skip">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Пропустить
            </button>
            <button class="btn-like" id="btn-like">
              <svg width="15" height="14" viewBox="0 0 15 14" fill="none"><path d="M7.5 12.5S1.5 8.5 1.5 4.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6 8-6 8z" fill="white" stroke="white" stroke-width="1.2" stroke-linejoin="round"/></svg>
              Нравится
            </button>
          </div>
        </div>
      </div>

      <!-- original order drawer -->
      <div id="overview-drawer">
        <div class="drawer-hdr">
          <span>Исходная выдача</span>
          <div class="drawer-hdr-legend">
            <span class="legend-dot"><span class="dot green"></span>лайк</span>
            <span class="legend-dot"><span class="dot red"></span>скип</span>
            <span class="legend-dot"><span class="dot gray"></span>видел</span>
          </div>
        </div>
        <div class="overview-list" id="overview-list"></div>
      </div>

      <!-- session summary panel -->
      <div id="summary-panel">
        <div class="summary-stats" id="summary-stats"></div>
        <div class="summary-tabs">
          <button class="summary-tab active" id="tab-history">История</button>
          <button class="summary-tab" id="tab-original">Исходная выдача</button>
          <div class="summary-legend">
            <span class="legend-dot"><span class="dot green"></span>лайк</span>
            <span class="legend-dot"><span class="dot red"></span>скип</span>
            <span class="legend-dot"><span class="dot gray"></span>видел</span>
          </div>
        </div>
        <div class="summary-list-wrap" id="summary-list"></div>
        <div class="summary-footer">
          <button class="btn-primary" id="btn-summary-new">Начать новую сессию</button>
          <button class="btn-secondary" id="btn-summary-back">Продолжить сессию</button>
        </div>
      </div>

      <div class="status-bar" id="status"></div>

    </div>

    <script>
      const EID_LIKE = 1, EID_SKIP = 2;
      const USER_ID  = 1000001;

      const $start          = document.getElementById("start-screen");
      const $feed           = document.getElementById("feed-screen");
      const $btnStart       = document.getElementById("btn-start");
      const $btnCont        = document.getElementById("btn-continue");
      const $btnNew         = document.getElementById("btn-new");
      const $btnOv          = document.getElementById("btn-overview");
      const $btnEnd         = document.getElementById("btn-end");
      const $status         = document.getElementById("status");
      const $title          = document.getElementById("card-title");
      const $meta           = document.getElementById("card-meta");
      const $img            = document.getElementById("card-img");
      const $badge          = document.getElementById("rank-badge");
      const $card           = document.getElementById("card");
      const $feedPanel      = document.getElementById("feed-panel");
      const $ovDrawer       = document.getElementById("overview-drawer");
      const $ovList         = document.getElementById("overview-list");
      const $btnLike        = document.getElementById("btn-like");
      const $btnSkip        = document.getElementById("btn-skip");
      const $summaryPanel   = document.getElementById("summary-panel");
      const $summaryStats   = document.getElementById("summary-stats");
      const $summaryList    = document.getElementById("summary-list");
      const $btnSummaryNew  = document.getElementById("btn-summary-new");
      const $btnSummaryBack = document.getElementById("btn-summary-back");

      let sessionId    = null;
      let current      = null;
      let overviewOpen = false;
      let summaryOpen  = false;

      // history of items shown during this session, in viewed order
      // each entry: { item_id, title, image_url, status: 'liked'|'skipped'|'seen' }
      let viewHistory  = [];

      function mkSid() { return `s_${Math.random().toString(36).slice(2)}_${Date.now()}`; }

      if (localStorage.getItem("session_id")) {
        $btnCont.style.display = "";
      }

      function showFeed() {
        $start.style.display = "none";
        $feed.style.display  = "flex";
      }

      function startNewSession() {
        sessionId = mkSid();
        localStorage.setItem("session_id", sessionId);
        viewHistory = [];
      }

      $btnStart.onclick = () => {
        startNewSession();
        showFeed();
        loadCard();
      };

      $btnCont.onclick = () => {
        sessionId = localStorage.getItem("session_id") || mkSid();
        localStorage.setItem("session_id", sessionId);
        viewHistory = [];
        showFeed();
        loadCard();
      };

      $btnNew.onclick = () => {
        startNewSession();
        closeOverview();
        closeSummary();
        loadCard();
      };

      // ── overview ──────────────────────────────────────
      $btnOv.onclick = () => overviewOpen ? closeOverview() : openOverview();

      // ── summary ───────────────────────────────────────
      const $tabHistory  = document.getElementById("tab-history");
      const $tabOriginal = document.getElementById("tab-original");
      let summaryTab = "history"; // "history" | "original"

      $btnEnd.onclick          = () => summaryOpen ? closeSummary() : openSummary();
      $btnSummaryNew.onclick   = () => { startNewSession(); closeSummary(); loadCard(); };
      $btnSummaryBack.onclick  = () => closeSummary();

      $tabHistory.onclick  = () => { summaryTab = "history";  setActiveTab(); renderSummaryList(); };
      $tabOriginal.onclick = () => { summaryTab = "original"; setActiveTab(); renderOriginalList(); };

      function setActiveTab() {
        $tabHistory.classList.toggle("active",  summaryTab === "history");
        $tabOriginal.classList.toggle("active", summaryTab === "original");
      }

      function openOverview() {
        overviewOpen = true;
        $btnOv.classList.add("active");
        $feedPanel.style.display = "none";
        $ovDrawer.style.display  = "flex";
        loadOverview();
      }

      function closeOverview() {
        overviewOpen = false;
        $btnOv.classList.remove("active");
        $feedPanel.style.display = "";
        $ovDrawer.style.display  = "none";
      }

      function openSummary() {
        summaryOpen = true;
        closeOverview();
        summaryTab = "history";
        setActiveTab();
        $btnEnd.classList.add("active");
        $feedPanel.style.display    = "none";
        $summaryPanel.style.display = "flex";
        renderSummaryStats();
        renderSummaryList();
      }

      function closeSummary() {
        summaryOpen = false;
        $btnEnd.classList.remove("active");
        $feedPanel.style.display    = "";
        $summaryPanel.style.display = "none";
      }

      function _fullHistory() {
        return current
          ? [...viewHistory, { ...current, status: "seen" }]
          : [...viewHistory];
      }

      function renderSummaryStats() {
        const hist    = _fullHistory();
        const liked   = hist.filter(i => i.status === "liked").length;
        const skipped = hist.filter(i => i.status === "skipped").length;
        $summaryStats.innerHTML = `
          <div class="stat-card liked">
            <div class="stat-val">${liked}</div>
            <div class="stat-label">Нравится</div>
          </div>
          <div class="stat-card skipped">
            <div class="stat-val">${skipped}</div>
            <div class="stat-label">Пропущено</div>
          </div>
          <div class="stat-card total">
            <div class="stat-val">${hist.length}</div>
            <div class="stat-label">Всего</div>
          </div>`;
      }

      const DOT_SUM = {
        liked:   `<span class="dot green"></span>`,
        skipped: `<span class="dot red"></span>`,
        seen:    `<span class="dot gray"></span>`,
        unseen:  `<span class="dot" style="background:transparent;border:1.5px solid var(--border)"></span>`,
      };

      function _ovItemHTML(it, rank) {
        const src = it.image_url && !it.image_url.startsWith("/")
          ? it.image_url
          : location.origin + (it.image_url || "");
        return `<div class="ov-item ${it.status}">
          <span class="ov-rank">${rank}</span>
          <img class="ov-thumb" src="${src}" alt="" loading="lazy" />
          <span class="ov-text">${it.title}</span>
          <span class="ov-status">${DOT_SUM[it.status] ?? ""}</span>
        </div>`;
      }

      function renderSummaryList() {
        const hist = _fullHistory();
        if (!hist.length) {
          $summaryList.innerHTML = `<div style="padding:32px 0;text-align:center;color:var(--muted);font-size:13px">Нет просмотренных айтемов</div>`;
          return;
        }
        $summaryList.innerHTML = hist.map((it, i) => _ovItemHTML(it, i + 1)).join("");
      }

      async function renderOriginalList() {
        $summaryList.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Загрузка…</div>`;
        let data;
        try {
          const r = await fetch(
            `/api/v1/session_overview?session_id=${encodeURIComponent(sessionId)}&user_id=${USER_ID}`
          );
          if (!r.ok) throw new Error(r.status);
          data = await r.json();
        } catch {
          $summaryList.innerHTML = `<div style="padding:24px;text-align:center;color:var(--red);font-size:13px">Ошибка загрузки</div>`;
          return;
        }
        if (summaryTab !== "original") return;

        if (!data.items.length) {
          $summaryList.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Нет данных</div>`;
          return;
        }

        $summaryList.innerHTML = data.items.map(it => _ovItemHTML(it, it.original_rank)).join("");
      }

      async function loadOverview() {
        $ovList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Загрузка…</div>`;
        let data;
        try {
          const r = await fetch(
            `/api/v1/session_overview?session_id=${encodeURIComponent(sessionId)}&user_id=${USER_ID}`
          );
          if (!r.ok) { $ovList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--red)">Ошибка</div>`; return; }
          data = await r.json();
        } catch {
          $ovList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--red)">Ошибка сети</div>`;
          return;
        }

        if (!data.items.length) {
          $ovList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Нет данных</div>`;
          return;
        }

        $ovList.innerHTML = data.items.map(it => _ovItemHTML(it, it.original_rank)).join("");
      }

      // ── feed ─────────────────────────────────────────
      async function loadCard() {
        if (summaryOpen) return;
        $status.textContent = "";
        $badge.innerHTML = "";
        $meta.textContent = "";

        let data;
        try {
          const r = await fetch(
            `/api/v1/feed?session_id=${encodeURIComponent(sessionId)}&user_id=${USER_ID}&limit=1`
          );
          if (!r.ok) { $status.textContent = "Сервер недоступен."; return; }
          data = await r.json();
        } catch {
          $status.textContent = "Ошибка сети.";
          return;
        }

        current = data.items[0] ?? null;

        if (!current) {
          $title.textContent = "Все объявления просмотрены";
          $img.src = "";
          return;
        }

        $title.textContent = current.title;

        const src = current.image_url;
        $img.src = src.startsWith("/") ? location.origin + src : src;

        if (current.source && current.source.startsWith("ann")) {
          const kind = current.source === "ann_explore" ? "explore" : "exploit";
          $badge.innerHTML = `<span class="badge ann">★ ANN · ${kind}</span>`;
          $meta.textContent = "Рекомендация ANN (вне исходной выдачи сессии)";
        } else {
          const d = current.rank_delta;
          if (d != null) {
            const cls  = d > 0 ? "up" : d < 0 ? "down" : "same";
            const sign = d > 0 ? "↑" : d < 0 ? "↓" : "–";
            const text = d !== 0 ? `${sign}${Math.abs(d)}` : "без изменений";
            $badge.innerHTML = `<span class="badge ${cls}">${text}</span>`;
            if (d > 0) {
              $meta.textContent = `Поднялось на ${d} позиций после реранкинга`;
            } else if (d < 0) {
              $meta.textContent = `Опустилось на ${Math.abs(d)} позиций`;
            }
          }
        }

        $card.style.animation = "none";
        void $card.offsetHeight;
        $card.style.animation = "";
      }

      async function send(eid) {
        if (!current) return;
        // record interaction in local history before firing request
        viewHistory.push({
          item_id:   current.item_id,
          title:     current.title,
          image_url: current.image_url,
          status:    eid === EID_LIKE ? "liked" : "skipped",
        });
        await fetch("/api/v1/interact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId, user_id: USER_ID,
            item_id: current.item_id, eid,
          }),
        });
        if (overviewOpen) {
          await loadOverview();
        } else {
          await loadCard();
        }
      }

      $btnLike.onclick = () => send(EID_LIKE);
      $btnSkip.onclick = () => send(EID_SKIP);
    </script>
  </body>
</html>
